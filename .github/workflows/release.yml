name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm test --if-present
      - run: npm run build --if-present
      - run: node dist/cli/index.js check
      - run: npm pack --dry-run --ignore-scripts
      - id: published
        run: |
          if npm view "${npm_package_name}@${npm_package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${npm_package_name}@${npm_package_version} is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      # Configure npm trusted publishing for this package on npmjs.com using this workflow filename.
      - if: steps.published.outputs.exists == 'false'
        run: npm publish
